# Publishes the docsify competitive-research site to GitLab Pages.
# The site is static (no build step) — this job just copies it into public/.
# Runs on the laptop-eval project runner (the only runner on this instance).

pages:
  stage: deploy
  image: alpine:latest
  tags:
    - laptop-eval
  script:
    - mkdir -p public
    - cp index.html public/
    - cp .nojekyll public/ || true
    - cp -r research public/research
  artifacts:
    paths:
      - public
  rules:
    # Deploy from the default branch, and from this research branch pre-merge.
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "research/competitive-landscape"'
