<!doctype html>
<html lang="en" data-theme="aurum">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bolt — the agent with a wallet</title>
    <!-- PWA (#38): manifest + theme color + svg/apple touch icon make the app
         installable. The service worker is registered from main.tsx. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0b0b0e" />
    <link rel="icon" type="image/png" href="/logos/bolt.png" />
    <link rel="apple-touch-icon" href="/logos/bolt.png" />
    <!-- Aurum type system (#53): Bricolage Grotesque (bold display), Hanken
         Grotesk (body), JetBrains Mono (money / addresses / terminal). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Hanken+Grotesk:wght@300..800&family=JetBrains+Mono:wght@400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="vellum-ui">
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>

    <!-- Self-hosted feedback widget. Same-origin everywhere: /widget.js loads
         from the SPA, submissions POST to /v1/feedback which the Hono server
         (see packages/web/src/server.ts) reverse-proxies to beacon. Mirrors
         the production landing's setup — no "beacon" hostname or URL substring
         exposed client-side, no CORS preflight. -->
    <script
      src="/widget.js"
      data-project="pub_Fs6whQdb9dheT8tXwi6cEMaqTkF0UV59"
      data-endpoint=""
      data-primary="#d4af37"
      data-title="Spotted something? Tell us."
      defer
    ></script>
  </body>
</html>
