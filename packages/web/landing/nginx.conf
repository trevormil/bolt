# Bolt landing nginx config. Two responsibilities:
#   1. Serve the static splash (index.html + bolt.png + widget.js).
#   2. Proxy /v1/* to https://beacon.trevormil.com — keeps the widget
#      submission on the bolt.trevormil.com origin so adblockers don't
#      block the "beacon" hostname and stale-DNS clients still work.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Public resolver so nginx re-resolves beacon.trevormil.com on its
    # TTL instead of caching the upstream IP forever (nginx default).
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

    # Static assets.
    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse-proxy the Beacon API. Origin is preserved verbatim so
    # Beacon's allowedOrigins check still sees https://bolt.trevormil.com.
    # Host is rewritten so the beacon ingress routes to its service.
    location /v1/ {
        set $upstream "https://beacon.trevormil.com";
        proxy_pass         $upstream;
        proxy_ssl_server_name on;
        proxy_set_header   Host              beacon.trevormil.com;
        proxy_set_header   Origin            $http_origin;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   User-Agent        $http_user_agent;
        proxy_set_header   X-Beacon-Public-Key $http_x_beacon_public_key;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
