apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bolt-landing
  namespace: bolt-landing
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [bolt.trevormil.com]
      secretName: bolt-trevormil-tls
  rules:
    - host: bolt.trevormil.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bolt-landing
                port:
                  number: 80
