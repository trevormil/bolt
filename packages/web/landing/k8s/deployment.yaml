apiVersion: apps/v1
kind: Deployment
metadata:
  name: bolt-landing
  namespace: bolt-landing
  labels:
    app: bolt-landing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bolt-landing
  template:
    metadata:
      labels:
        app: bolt-landing
    spec:
      containers:
        - name: nginx
          image: ghcr.io/trevormil/bolt-landing:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 64Mi
      imagePullSecrets:
        - name: ghcr-pull
